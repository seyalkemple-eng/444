<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Portal de Informações</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:#f1f5f9;
color:#0f172a;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
}

/* CARD */
.card{
width:100%;
max-width:420px;
background:white;
border-radius:16px;
padding:30px;
text-align:center;
box-shadow:0 10px 40px rgba(0,0,0,0.1);
}

/* TITULO */
h1{
font-size:22px;
margin-bottom:10px;
}

/* TEXTO */
.desc{
font-size:14px;
color:#475569;
margin-bottom:20px;
}

/* INPUT */
.input{
width:100%;
padding:14px;
border-radius:8px;
border:1px solid #ccc;
margin-bottom:15px;
}

/* BOTÃO */
.btn{
width:100%;
padding:15px;
border:none;
border-radius:8px;
background:#2563eb;
color:white;
font-weight:600;
font-size:16px;
cursor:pointer;
}

.btn:hover{
background:#1d4ed8;
}

/* AVISO */
.notice{
margin-top:15px;
font-size:12px;
color:#64748b;
}

/* CHECKBOX */
.check{
margin-top:15px;
font-size:13px;
text-align:left;
}

</style>
</head>

<body>

<div class="card">

<h1>Acessar Informações</h1>

<div class="desc">
Preencha seu nome para continuar e acessar informações disponíveis online.
</div>

<input type="text" id="nome" class="input" placeholder="Digite seu nome completo">

<div class="check">
<input type="checkbox" id="check">
<label for="check">Li e concordo com os termos e política de privacidade</label>
</div>

<button class="btn" onclick="continuar()">
Continuar
</button>

<div class="notice">
Você será redirecionado para uma página externa com mais informações.
</div>

</div>

<script>

function continuar(){

let nome = document.getElementById("nome").value.trim()
let check = document.getElementById("check").checked

if(nome === ""){
alert("Digite seu nome")
return
}

if(!check){
alert("Você precisa aceitar os termos")
return
}

window.location.href="https://diaservicofeirao26.org/"

}

</script>

</body>
</html>
